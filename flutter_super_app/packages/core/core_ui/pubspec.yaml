name: core_ui
description: Core UI package for Flutter super app. Provides common widgets and components.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  core_base:
    path: ../core_base
  core_utils:
    path: ../core_utils
  core_media:
    path: ../core_media
  core_audio:
    path: ../core_audio
  core_image:
    path: ../core_image

  # UI dependencies
  video_player: ^2.9.0
  just_audio: ^0.9.40
  cached_network_image: ^3.2.0
  image_picker: ^1.0.4
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
