name: core_image
description: Image handling package for Flutter super app. Provides image loader and cropper controllers.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  core_base:
    path: ../core_base
  core_utils:
    path: ../core_utils

  # Image dependencies
  cached_network_image: ^3.2.0
  flutter_cache_manager: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
