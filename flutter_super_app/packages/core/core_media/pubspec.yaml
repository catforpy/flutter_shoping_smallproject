name: core_media
description: Media handling package for Flutter super app. Provides video player, media picker, and utilities.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  core_base:
    path: ../core_base
  core_utils:
    path: ../core_utils
  core_logging:
    path: ../core_logging

  # Media dependencies
  image_picker: ^1.0.4
  photo_view: ^0.15.0
  path: ^1.8.0
  video_player: ^2.9.0
  wechat_assets_picker: ^10.1.0
  wechat_camera_picker: ^4.4.0
  photo_manager: ^3.0.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
